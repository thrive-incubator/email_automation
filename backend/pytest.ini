[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    -ra
    --strict-markers
    --tb=short
    --color=yes
markers =
    live: tests that hit real external APIs (skipped by default; opt in with --live)
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:google.*
